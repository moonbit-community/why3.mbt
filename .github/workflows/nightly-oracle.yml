name: nightly-oracle

on:
  schedule:
    - cron: "17 2 * * *"
  workflow_dispatch:

permissions:
  contents: read
  packages: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  oracle:
    name: full layered oracle
    runs-on: ubuntu-24.04
    env:
      WHY3_ORACLE_IMAGE_DIGEST: sha256:fe30c5e0b8254f989de466476809c05e388cf675553f9ca86a4171999bd74da8
    container:
      image: ghcr.io/moonbit-community/why3.mbt-why3@sha256:fe30c5e0b8254f989de466476809c05e388cf675553f9ca86a4171999bd74da8
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803

      - name: Trust checkout workspace
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Set up MoonBit stable
        uses: moonbit-community/setup-moonbit@04293a8a813bfd4b6c2fce22701b52ae1050d100
        with:
          version: stable

      - name: Bootstrap and verify contracts
        run: |
          moon version --all
          why3 --version
          z3 --version
          moon update && moon check
          node tools/why3_oracle/generate_moon_dependency_inventory.mjs \
            --check tools/contracts/moon-dependencies-v1.json
          node tools/check_pr00_contracts.mjs \
            --why3-archive "$WHY3_REFERENCE_ARCHIVE" \
            --require-toolchain-lock

      - name: Run complete layered differentials
        run: |
          node tools/check_why3_fixtures.mjs
          node tools/why3_oracle/run_elab_differential.mjs \
            --why3-archive "$WHY3_REFERENCE_ARCHIVE"
          node tools/why3_oracle/run_transform_differential.mjs \
            --why3-archive "$WHY3_REFERENCE_ARCHIVE"
          node tools/why3_oracle/run_smt_differential.mjs \
            --why3-archive "$WHY3_REFERENCE_ARCHIVE"
          node tools/why3_oracle/run_unsupported_gate.mjs
          node tools/why3_oracle/sync_pr_golden_lock.mjs --check

      - name: Generate full nightly artifacts and compare PR goldens
        run: |
          records="$RUNNER_TEMP/nightly-pr-records"
          result="$RUNNER_TEMP/nightly-prover-result.json"
          node tools/why3_oracle/manage_pr_goldens.mjs \
            --candidate "$records"
          for file in \
            manifest.json \
            typed-semantic.ndjson \
            raw-task.ndjson \
            transform-checkpoints.ndjson \
            prepared-task.ndjson \
            smt-token-stream.ndjson
          do
            cmp "tools/why3_oracle/goldens/pr-v1/$file" "$records/$file"
          done
          node tools/why3_oracle/run_result_differential.mjs \
            --candidate "$result"
          cmp tools/why3_oracle/goldens/pr-v1/prover-result.json "$result"

      - name: Upload full nightly oracle records
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: nightly-oracle-${{ github.sha }}
          path: |
            ${{ runner.temp }}/nightly-pr-records
            ${{ runner.temp }}/nightly-prover-result.json
          if-no-files-found: error
