name: update-oracle

on:
  workflow_dispatch:
    inputs:
      mode:
        description: Generate a candidate or explicitly verify and promote it in the checkout
        required: true
        default: candidate
        type: choice
        options:
          - candidate
          - promote

permissions:
  contents: read
  packages: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  update:
    name: ${{ inputs.mode }} oracle goldens
    runs-on: ubuntu-24.04
    env:
      WHY3_ORACLE_IMAGE_DIGEST: sha256:fe30c5e0b8254f989de466476809c05e388cf675553f9ca86a4171999bd74da8
    container:
      image: ghcr.io/moonbit-community/why3.mbt-why3@sha256:fe30c5e0b8254f989de466476809c05e388cf675553f9ca86a4171999bd74da8
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803

      - name: Trust checkout workspace
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Set up MoonBit stable
        uses: moonbit-community/setup-moonbit@04293a8a813bfd4b6c2fce22701b52ae1050d100
        with:
          version: stable

      - name: Verify immutable inputs
        run: |
          moon version --all
          why3 --version
          z3 --version
          node tools/run.mjs bootstrap
          node tools/run.mjs contracts \
            --why3-archive "$WHY3_REFERENCE_ARCHIVE" \
            --require-toolchain-lock
          node tools/run.mjs layers \
            --why3-archive "$WHY3_REFERENCE_ARCHIVE"

      - name: Generate candidates in separate paths
        run: |
          node tools/run.mjs goldens candidate \
            --records "$RUNNER_TEMP/oracle-candidate" \
            --result "$RUNNER_TEMP/prover-result.json" \
            --lock "$RUNNER_TEMP/toolchain-lock.json"

      - name: Explicitly promote after fresh regeneration
        if: inputs.mode == 'promote'
        run: |
          node tools/run.mjs goldens promote \
            --records "$RUNNER_TEMP/oracle-candidate" \
            --result "$RUNNER_TEMP/prover-result.json"

      - name: Render review patch
        run: |
          git diff --binary -- \
            tools/contracts/toolchain-lock.json \
            tools/why3_oracle/goldens/pr-v1 \
            > "$RUNNER_TEMP/oracle-golden.patch"
          git status --short > "$RUNNER_TEMP/oracle-golden.status"

      - name: Upload candidate and review material
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: oracle-${{ inputs.mode }}-${{ github.sha }}
          path: |
            ${{ runner.temp }}/oracle-candidate
            ${{ runner.temp }}/prover-result.json
            ${{ runner.temp }}/toolchain-lock.json
            ${{ runner.temp }}/oracle-golden.patch
            ${{ runner.temp }}/oracle-golden.status
          if-no-files-found: error
