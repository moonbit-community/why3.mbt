name: check

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  oracle-build:
    name: fixed oracle
    runs-on: ubuntu-24.04
    env:
      WHY3_ORACLE_IMAGE_DIGEST: sha256:fe30c5e0b8254f989de466476809c05e388cf675553f9ca86a4171999bd74da8
    container:
      image: ghcr.io/moonbit-community/why3.mbt-why3@sha256:fe30c5e0b8254f989de466476809c05e388cf675553f9ca86a4171999bd74da8
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803

      - name: Trust checkout workspace
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Set up MoonBit stable
        uses: moonbit-community/setup-moonbit@04293a8a813bfd4b6c2fce22701b52ae1050d100
        with:
          version: stable

      - name: Show tool versions
        run: |
          moon version --all
          moonrun --version
          why3 --version
          z3 --version

      - name: Bootstrap MoonBit dependencies
        run: node tools/run.mjs bootstrap

      - name: Check the fixed oracle
        run: |
          node tools/run.mjs oracle \
            --why3-archive "$WHY3_REFERENCE_ARCHIVE" \
            --require-toolchain-lock

      - name: Check the project
        run: node tools/run.mjs project
