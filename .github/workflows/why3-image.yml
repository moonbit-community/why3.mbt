name: why3-image

on:
  push:
    branches:
      - main
      - optmizing-ci
    paths:
      - Dockerfile
      - .dockerignore
      - .github/workflows/why3-image.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: why3-image
  cancel-in-progress: true

jobs:
  build-and-push:
    name: build and push
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Why3 image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}-why3:1.7.2
            ghcr.io/${{ github.repository }}-why3:1.7.2-${{ github.sha }}
          build-args: |
            WHY3_VERSION=1.7.2
          cache-from: type=gha,scope=why3-1.7.2
          cache-to: type=gha,mode=max,scope=why3-1.7.2
